apiVersion: apps/v1
kind: Deployment
metadata:
  name: diabetes-api
  labels:
    app: diabetes-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: diabetes-api
  template:
    metadata:
      labels:
        app: diabetes-api
    spec:
      containers:
      - name: diabetes-api
        image: diabetes-prediction-model:latest
        ports:
        - containerPort: 8000
        imagePullPolicy: IfNotPresent
        env:
        - name: MODEL_S3_URI
          value: "s3://mlpipeline/models/diabetes/latest.pkl"
        - name: S3_ENDPOINT
          value: "http://seaweedfs.kubeflow:9000"
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: s3-creds
              key: access-key
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: s3-creds
              key: secret-key
---
apiVersion: v1
kind: Service
metadata:
  name: diabetes-api-service
spec:
  selector:
    app: diabetes-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
      nodePort: 30080
  type: NodePort
